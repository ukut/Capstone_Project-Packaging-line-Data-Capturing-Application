services:
  - type: web
    name: bottling-line-demo
    env: python
    plan: free
    buildCommand: |
      pip install -e .
      python -m scripts.init_db
      python -m scripts.seed_synthetic
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./bottling.db
      - key: SESSION_COOKIE_SECURE
        value: "true"
